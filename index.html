<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Timer">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0f0f0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Visual Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', -apple-system, system-ui, sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-font-smoothing: antialiased;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    touch-action: none;
  }

  .timer {
    position: relative;
    width: min(96vw, 96vh);
    height: min(96vw, 96vh);
    cursor: grab;
  }
  .timer.dragging { cursor: grabbing; }

  .timer-face {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 8px 0 rgba(0,0,0,0.07), 0 2px 24px rgba(0,0,0,0.06), inset 0 0 0 5px #e8e8e8;
    overflow: hidden;
  }

  .timer-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    gap: 8px;
    pointer-events: none;
  }

  .time-display {
    font-size: min(96px, 24vw);
    font-weight: 900;
    letter-spacing: -3px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #2a2a2a;
  }

  .hint {
    font-size: min(14px, 3.5vw);
    font-weight: 700;
    color: #bbb;
    transition: opacity 0.3s;
  }

  .play-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: #e74c3c;
    color: white;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 0 #c0392b;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
    pointer-events: auto;
    margin-top: 4px;
  }
  .play-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #c0392b; }
  .play-btn.running {
    background: #f39c12;
    box-shadow: 0 4px 0 #d68910;
  }
  .play-btn.running:active { box-shadow: 0 1px 0 #d68910; }

  .reset-link {
    font-size: 13px;
    font-weight: 700;
    color: #bbb;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    padding: 4px 8px;
    pointer-events: auto;
  }

  /* Hide hint when time is set */
  .timer.has-time .hint { display: none; }

  /* Pulse last 10s */
  .timer.pulse .time-display {
    color: #e74c3c;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.06); opacity: 0.5; }
  }

  /* Alert Overlay */
  .alert-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    z-index: 100;
    animation: alertFlash 0.6s infinite;
    cursor: pointer;
  }
  .alert-overlay.show { display: flex; }

  @keyframes alertFlash {
    0%, 100% { background: #e74c3c; }
    50% { background: #c0392b; }
  }

  .alert-icon {
    font-size: 120px;
    animation: alertBounce 0.35s infinite alternate ease-in-out;
  }
  .alert-text {
    font-size: min(52px, 13vw);
    font-weight: 900;
    color: white;
    text-shadow: 0 4px 8px rgba(0,0,0,0.2);
    animation: alertShake 0.25s infinite;
  }
  .alert-stop {
    background: white;
    color: #e74c3c;
    border: none;
    font-family: inherit;
    font-size: 22px;
    font-weight: 900;
    padding: 18px 56px;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.12);
    -webkit-tap-highlight-color: transparent;
  }
  .alert-stop:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }

  @keyframes alertBounce { from { transform: scale(1); } to { transform: scale(1.2); } }
  @keyframes alertShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
</style>
</head>
<body>

<div class="timer" id="timer">
  <div class="timer-face">
    <canvas class="timer-canvas" id="canvas"></canvas>
  </div>
  <div class="center">
    <div class="time-display" id="time">0:00</div>
    <div class="hint" id="hint">Drag to set time</div>
    <button class="play-btn" id="play" onclick="toggle()">▶</button>
    <div class="reset-link" id="reset" onclick="reset()" style="display:none">reset</div>
  </div>
</div>

<div class="alert-overlay" id="alert" onclick="dismiss()">
  <div class="alert-icon">🔔</div>
  <div class="alert-text">TIME'S UP!</div>
  <button class="alert-stop" onclick="dismiss()">STOP</button>
</div>

<script>
(function() {
  var total = 0, remain = 0, running = false, iv = null;
  var audioCtx = null, alarmIv = null, vibIv = null;
  var canvas, ctx, dpr;
  var dragging = false;
  var lastAngle = -1;

  function $(id) { return document.getElementById(id); }

  function fmt(s) {
    var m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function initCanvas() {
    canvas = $('canvas');
    dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
  }

  function draw() {
    if (!ctx) return;
    var w = canvas.width / dpr, h = canvas.height / dpr;
    var cx = w / 2, cy = h / 2;
    var pad = w * 0.04;
    var r = w / 2 - pad;
    ctx.clearRect(0, 0, w, h);

    // Track
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#f0f0f0';
    ctx.fill();

    // Red pie
    var pieR = r * 0.78;
    var secs = running ? remain : total;
    if (secs > 0) {
      var frac = secs / 3600;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, pieR, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
      ctx.closePath();
      ctx.fillStyle = '#e74c3c';
      ctx.fill();
    }

    // Ticks
    for (var i = 0; i < 60; i++) {
      var a = (i * 6 - 90) * Math.PI / 180;
      var maj = i % 5 === 0;
      var o = r, inner = maj ? r - 14 : r - 7;
      ctx.beginPath();
      ctx.moveTo(cx + o * Math.cos(a), cy + o * Math.sin(a));
      ctx.lineTo(cx + inner * Math.cos(a), cy + inner * Math.sin(a));
      ctx.strokeStyle = maj ? 'rgba(0,0,0,0.3)' : 'rgba(0,0,0,0.1)';
      ctx.lineWidth = maj ? 2.5 : 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Numbers
    var nums = [60,5,10,15,20,25,30,35,40,45,50,55];
    var fontSize = Math.round(w * 0.044);
    ctx.font = 'bold ' + fontSize + 'px Nunito,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    var numR = r - 22;
    for (var j = 0; j < 12; j++) {
      var a2 = (j * 30 - 90) * Math.PI / 180;
      ctx.fillText(nums[j], cx + numR * Math.cos(a2), cy + numR * Math.sin(a2));
    }
  }

  function update() {
    $('time').textContent = fmt(running ? remain : total);
    draw();
    var el = $('timer');
    el.classList.toggle('has-time', total > 0);
    el.classList.toggle('pulse', running && remain <= 10 && remain > 0);
    $('reset').style.display = (!running && remain > 0 && remain < total) ? '' : 'none';

    // Play button state
    if (running) {
      $('play').textContent = '❚❚';
      $('play').classList.add('running');
    } else {
      $('play').textContent = '▶';
      $('play').classList.remove('running');
    }
  }

  function tick() {
    if (remain <= 0) {
      clearInterval(iv); iv = null; running = false;
      update();
      showAlert();
      return;
    }
    remain--;
    update();
  }

  // ── Drag to set time ──
  function getAngleFromEvent(e) {
    var rect = $('timer').getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var x, y;
    if (e.touches) {
      x = e.touches[0].clientX;
      y = e.touches[0].clientY;
    } else {
      x = e.clientX;
      y = e.clientY;
    }
    // Angle from 12 o'clock, clockwise, 0-360
    var angle = Math.atan2(x - cx, -(y - cy)) * 180 / Math.PI;
    if (angle < 0) angle += 360;
    return angle;
  }

  function angleToMinutes(angle) {
    // 360° = 60 min, snap to nearest minute
    var min = Math.round(angle / 6);
    if (min === 0) min = 60;
    return min;
  }

  function isOnPlayButton(e) {
    var btn = $('play');
    var rect = btn.getBoundingClientRect();
    var x = e.touches ? e.touches[0].clientX : e.clientX;
    var y = e.touches ? e.touches[0].clientY : e.clientY;
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  function startDrag(e) {
    if (running) return;
    if (isOnPlayButton(e)) return;
    e.preventDefault();
    dragging = true;
    lastAngle = getAngleFromEvent(e);
    $('timer').classList.add('dragging');
    setFromEvent(e);
  }

  function moveDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    var angle = getAngleFromEvent(e);
    var currentMin = Math.round(total / 60);
    var newMin = angleToMinutes(angle);

    // Detect crossing the 0/60 boundary
    // If last angle was near 360 and new angle is near 0 → trying to go past 60 clockwise → block
    if (lastAngle > 300 && angle < 60 && currentMin >= 55) {
      // Clamp to 60
      total = 3600;
      remain = total;
      lastAngle = angle;
      update();
      return;
    }
    // If last angle was near 0 and new angle is near 360 → going counter-clockwise past 0 → clamp to 0
    if (lastAngle < 60 && angle > 300 && currentMin <= 5) {
      total = 0;
      remain = 0;
      lastAngle = angle;
      update();
      return;
    }

    lastAngle = angle;
    total = newMin * 60;
    if (total > 3600) total = 3600;
    remain = total;
    update();
  }

  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    lastAngle = -1;
    $('timer').classList.remove('dragging');
    remain = total;
  }

  function setFromEvent(e) {
    var angle = getAngleFromEvent(e);
    var min = angleToMinutes(angle);
    total = Math.min(min * 60, 3600);
    remain = total;
    lastAngle = angle;
    update();
  }

  // Mouse events
  $('timer').addEventListener('mousedown', startDrag);
  window.addEventListener('mousemove', moveDrag);
  window.addEventListener('mouseup', endDrag);

  // Touch events
  $('timer').addEventListener('touchstart', startDrag, { passive: false });
  window.addEventListener('touchmove', moveDrag, { passive: false });
  window.addEventListener('touchend', endDrag);

  window.toggle = function() {
    if (total === 0) return;
    if (running) {
      clearInterval(iv); iv = null; running = false;
      releaseWake();
    } else {
      if (remain === 0) remain = total;
      running = true;
      iv = setInterval(tick, 1000);
      requestWake();
    }
    update();
  };

  window.reset = function() {
    clearInterval(iv); iv = null; running = false;
    remain = total;
    releaseWake();
    update();
  };

  // ── Alert ──
  function showAlert() {
    $('alert').classList.add('show');
    playAlarm();
    vibrateLoop();
  }

  window.dismiss = function() {
    $('alert').classList.remove('show');
    stopAlarm();
  };

  // ── BEEP BEEP alarm ──
  function playAlarm() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      var master = audioCtx.createGain();
      master.gain.value = 1.0;
      master.connect(audioCtx.destination);

      var beepPair = function() {
        var t = audioCtx.currentTime;
        var o1 = audioCtx.createOscillator(), g1 = audioCtx.createGain();
        o1.connect(g1); g1.connect(master);
        o1.type = 'sine'; o1.frequency.value = 1000;
        g1.gain.setValueAtTime(0.8, t);
        g1.gain.setValueAtTime(0.8, t + 0.12);
        g1.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        o1.start(t); o1.stop(t + 0.15);

        var o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
        o2.connect(g2); g2.connect(master);
        o2.type = 'sine'; o2.frequency.value = 1200;
        g2.gain.setValueAtTime(0.8, t + 0.2);
        g2.gain.setValueAtTime(0.8, t + 0.32);
        g2.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
        o2.start(t + 0.2); o2.stop(t + 0.35);
      };
      beepPair();
      alarmIv = setInterval(beepPair, 700);
    } catch(e) {}
  }

  function stopAlarm() {
    if (alarmIv) { clearInterval(alarmIv); alarmIv = null; }
    if (vibIv) { clearInterval(vibIv); vibIv = null; }
    if (navigator.vibrate) navigator.vibrate(0);
  }

  function vibrateLoop() {
    if (!navigator.vibrate) return;
    navigator.vibrate([300,100,300,100,300,100,600]);
    vibIv = setInterval(function() {
      navigator.vibrate([300,100,300,100,300,100,600]);
    }, 2000);
  }

  // ── Wake Lock ──
  var wl = null;
  function requestWake() {
    try { if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(function(l){wl=l;}); } catch(e){}
  }
  function releaseWake() { if(wl){wl.release();wl=null;} }

  // iOS audio unlock
  document.addEventListener('touchstart', function() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: true });

  // Init
  initCanvas();
  update();
  window.addEventListener('resize', function() { initCanvas(); draw(); });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
})();
</script>

</body>
</html>
